# Hourly collection run. The script itself decides what to poll from the UTC hour:
#   tier 1 every run · tier 2 every 4h · tier 3 daily 03:00 UTC · portals every 2h
#
# Requires three repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_URL, SUPABASE_SERVICE_KEY, DISCORD_WEBHOOK_URL
name: collect

on:
  schedule:
    - cron: '7 * * * *' # minute 7 — top-of-hour crons queue badly on GitHub
  workflow_dispatch:
    inputs:
      tiers:
        description: 'Tier override, e.g. 1,2,3 (empty = hour-based stagger)'
        required: false
        default: ''

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # supabase-js needs native WebSocket (Node 22+)
          cache: npm
      - run: npm ci
      - name: Collect
        run: |
          if [ -n "${{ github.event.inputs.tiers }}" ]; then
            npm run collect -- --tiers=${{ github.event.inputs.tiers }}
          else
            npm run collect
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
