# Netlify config — only functions for now (the Phase 6 dashboard adds a build).
[build]
  publish = "public"
  # Credit discipline: most pushes touch collectors/scoring/docs — none of which
  # exist in the deployed site. Skip the build unless something Netlify actually
  # serves has changed. (exit 0 = skip, exit 1 = build.)
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- netlify/ public/ netlify.toml package.json package-lock.json"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
